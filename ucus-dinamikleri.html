<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçuş Dinamikleri | Voltpitch Akademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        }
        input[type=range] { accent-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <span class="font-extrabold text-2xl tracking-tight text-slate-900">
                        Volt<span class="text-blue-600">pitch</span> 
                        <span class="font-light text-slate-500 text-xl ml-1">Akademi</span>
                    </span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Ana Sayfa</a>
                    <a href="telemetri.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Telemetri Merkezi</a>
                    <a href="ucus-dinamikleri.html" class="text-blue-600 border-b-2 border-blue-600 px-3 py-2 text-sm font-bold">Uçuş Dinamikleri</a>
                    <a href="arge-atolyesi.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Ar-Ge Atölyesi</a>
                    <a href="dokumantasyon.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Dokümantasyon</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex gap-8">
        
        <div class="flex-1 flex flex-col bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden relative">
            <div class="bg-slate-100 border-b border-slate-200 px-4 py-3 flex justify-between items-center absolute w-full z-10">
                <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider">3D Rüzgar Tüneli</h2>
                <span class="flex items-center gap-2 text-xs font-mono text-green-600">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> MOTOR AKTİF
                </span>
            </div>
            <div class="flex-1 bg-slate-50 bg-grid relative w-full h-full" id="canvas-container">
            </div>
        </div>

        <div class="w-80 flex flex-col gap-6 shrink-0 relative z-10 overflow-y-auto pb-4">
            
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
                <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider border-b border-slate-100 pb-3 mb-5">Kontrol Yüzeyleri</h2>
                
                <div class="mb-6">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">İrtifa Dümeni (Elevator)</label>
                        <span class="text-slate-400">Yunuslama / Pitch</span>
                    </div>
                    <input type="range" id="pitchSlider" min="-30" max="30" value="0" class="w-full">
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">Kanatçık (Aileron)</label>
                        <span class="text-slate-400">Yatış / Roll</span>
                    </div>
                    <input type="range" id="rollSlider" min="-30" max="30" value="0" class="w-full">
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">İstikamet Dümeni (Rudder)</label>
                        <span class="text-slate-400">Sapma / Yaw</span>
                    </div>
                    <input type="range" id="yawSlider" min="-30" max="30" value="0" class="w-full">
                </div>

                <div>
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">Motor Gücü (Thrust)</label>
                        <span class="text-slate-400">%</span>
                    </div>
                    <input type="range" id="thrustSlider" min="0" max="100" value="0" class="w-full">
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl shadow-sm p-5 text-white">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Canlı Uçuş Verisi</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                        <p class="text-[10px] text-slate-400 mb-1">PITCH AÇISI</p>
                        <p class="font-mono text-xl text-blue-400"><span id="pitchVal">0</span>°</p>
                    </div>
                    <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                        <p class="text-[10px] text-slate-400 mb-1">ROLL AÇISI</p>
                        <p class="font-mono text-xl text-green-400"><span id="rollVal">0</span>°</p>
                    </div>
                    <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                        <p class="text-[10px] text-slate-400 mb-1">YAW AÇISI</p>
                        <p class="font-mono text-xl text-yellow-400"><span id="yawVal">0</span>°</p>
                    </div>
                    <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                        <p class="text-[10px] text-slate-400 mb-1">GÜÇ</p>
                        <p class="font-mono text-xl text-red-400"><span id="thrustVal">0</span>%</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // 1. SAHNE VE KAMERA KURULUMU
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Kamerayı uçağa arkadan ve hafif çaprazdan bakacak şekilde yerleştiriyoruz
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(5, 4, 8); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Işıklar
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Renk Materyalleri
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1e3a8a }); // Koyu Mavi
        const wingMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6 }); // Açık Mavi
        const controlSurfaceMat = new THREE.MeshPhongMaterial({ color: 0xf97316 }); // Turuncu (Fark edilsin diye)
        const darkMat = new THREE.MeshPhongMaterial({ color: 0x333333 }); // Siyah/Gri

        // 2. DETAYLI UÇAK MODELİ İNŞASI
        const airplane = new THREE.Group();

        // Gövde (Fuselage)
        const fuselage = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 5), bodyMat);
        airplane.add(fuselage);

        // Kokpit Camı
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1), new THREE.MeshPhongMaterial({ color: 0x93c5fd }));
        cockpit.position.set(0, 0.7, 0.5);
        airplane.add(cockpit);

        // --- KANATLAR VE KANATÇIKLAR (ROLL) ---
        // Sol Kanat
        const leftWing = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 1.2), wingMat);
        leftWing.position.set(2.25, 0, 0);
        airplane.add(leftWing);
        // Sol Kanatçık (Aileron)
        const leftAileron = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.4), controlSurfaceMat);
        leftAileron.position.set(2.5, 0, -0.8);
        airplane.add(leftAileron);

        // Sağ Kanat
        const rightWing = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 1.2), wingMat);
        rightWing.position.set(-2.25, 0, 0);
        airplane.add(rightWing);
        // Sağ Kanatçık (Aileron)
        const rightAileron = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.4), controlSurfaceMat);
        rightAileron.position.set(-2.5, 0, -0.8);
        airplane.add(rightAileron);

        // --- KUYRUK VE DÜMENLER (PITCH & YAW) ---
        // Yatay Stabilizatör
        const hStab = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 0.8), wingMat);
        hStab.position.set(0, 0.2, -2.2);
        airplane.add(hStab);
        // İrtifa Dümenleri (Elevators)
        const leftElevator = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 0.4), controlSurfaceMat);
        leftElevator.position.set(0.6, 0.2, -2.8);
        airplane.add(leftElevator);
        const rightElevator = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.1, 0.4), controlSurfaceMat);
        rightElevator.position.set(-0.6, 0.2, -2.8);
        airplane.add(rightElevator);

        // Dikey Stabilizatör
        const vStab = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 1), wingMat);
        vStab.position.set(0, 0.8, -2.1);
        airplane.add(vStab);
        // İstikamet Dümeni (Rudder)
        const rudder = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.1, 0.5), controlSurfaceMat);
        rudder.position.set(0, 0.85, -2.85);
        airplane.add(rudder);

        // --- PERVANE (THRUST) ---
        const propellerGroup = new THREE.Group();
        propellerGroup.position.set(0, 0, 2.6); // Uçağın burnuna yerleştir

        const propHub = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 0.4, 8), darkMat);
        propHub.rotation.x = Math.PI / 2;
        propellerGroup.add(propHub);

        const propBlade1 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.1), darkMat);
        propellerGroup.add(propBlade1);
        const propBlade2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2, 0.1), darkMat);
        propellerGroup.add(propBlade2);

        airplane.add(propellerGroup);
        scene.add(airplane);

        // 3. HTML ELEMENTLERİNİ SEÇME (Sliderlar ve Metinler)
        const pitchSlider = document.getElementById('pitchSlider');
        const rollSlider = document.getElementById('rollSlider');
        const yawSlider = document.getElementById('yawSlider');
        const thrustSlider = document.getElementById('thrustSlider');

        const pitchVal = document.getElementById('pitchVal');
        const rollVal = document.getElementById('rollVal');
        const yawVal = document.getElementById('yawVal');
        const thrustVal = document.getElementById('thrustVal');

        // 4. ANİMASYON DÖNGÜSÜ (Her saniye 60 kare çalışır)
        function animate() {
            requestAnimationFrame(animate);

            // Slider değerlerini al
            const p = parseFloat(pitchSlider.value);
            const r = parseFloat(rollSlider.value);
            const y = parseFloat(yawSlider.value);
            const t = parseFloat(thrustSlider.value);

            // Dijital ekranları güncelle
            pitchVal.innerText = p;
            rollVal.innerText = r;
            yawVal.innerText = y;
            thrustVal.innerText = t;

            // Uçağın ana gövdesini döndür (Radyana çevirerek)
            airplane.rotation.x = THREE.MathUtils.degToRad(p);
            airplane.rotation.z = THREE.MathUtils.degToRad(-r);
            airplane.rotation.y = THREE.MathUtils.degToRad(-y);

            // KONTROL YÜZEYLERİNİ HAREKET ETTİR (Abartılı görünüm için açıyı biraz artırıyoruz)
            // Pitch -> İrtifa dümenleri hareket eder
            leftElevator.rotation.x = THREE.MathUtils.degToRad(-p * 1.5);
            rightElevator.rotation.x = THREE.MathUtils.degToRad(-p * 1.5);

            // Roll -> Kanatçıklar ters yönlü hareket eder
            leftAileron.rotation.x = THREE.MathUtils.degToRad(r * 1.5);
            rightAileron.rotation.x = THREE.MathUtils.degToRad(-r * 1.5);

            // Yaw -> İstikamet dümeni hareket eder
            rudder.rotation.y = THREE.MathUtils.degToRad(-y * 1.5);

            // Thrust -> Pervaneyi döndür
            propellerGroup.rotation.z -= (t * 0.005); // Yüzdeye göre dönüş hızı

            renderer.render(scene, camera);
        }

        // Pencere boyutu değiştiğinde 3D alanı uydur
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Simülasyonu Başlat
        animate();
    </script>
</body>
</html>
