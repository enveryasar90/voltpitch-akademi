<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçuş Dinamikleri | Voltpitch Akademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        }
        input[type=range] { accent-color: #2563eb; }
        /* Scrollbar Gizleme */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-[100dvh] flex flex-col overflow-hidden">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shrink-0">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between md:h-16 items-start md:items-center py-3 md:py-0 gap-3 md:gap-0">
                <div class="flex items-center shrink-0">
                    <span class="font-extrabold text-2xl tracking-tight text-slate-900">
                        Volt<span class="text-blue-600">pitch</span> 
                        <span class="font-light text-slate-500 text-xl ml-1">Akademi</span>
                    </span>
                </div>
                <div class="flex space-x-6 overflow-x-auto w-full md:w-auto no-scrollbar pb-1 md:pb-0">
                    <a href="index.html" class="text-slate-500 hover:text-blue-600 py-1 text-sm font-medium transition whitespace-nowrap">Ana Sayfa</a>
                    <a href="telemetri.html" class="text-slate-500 hover:text-blue-600 py-1 text-sm font-medium transition whitespace-nowrap">Telemetri Merkezi</a>
                    <a href="ucus-dinamikleri.html" class="text-blue-600 border-b-2 border-blue-600 py-1 text-sm font-bold whitespace-nowrap">Uçuş Dinamikleri</a>
                    <a href="arge-atolyesi.html" class="text-slate-500 hover:text-blue-600 py-1 text-sm font-medium transition whitespace-nowrap">Ar-Ge Atölyesi</a>
                    <a href="dokumantasyon.html" class="text-slate-500 hover:text-blue-600 py-1 text-sm font-medium transition whitespace-nowrap">Dokümantasyon</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-[1600px] w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 lg:py-6 flex flex-col lg:flex-row gap-4 lg:gap-6 overflow-hidden">
        
        <div class="w-full lg:w-96 flex flex-col gap-4 lg:gap-6 shrink-0 overflow-y-auto no-scrollbar order-2 lg:order-1 pb-6 lg:pb-0">
            
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 lg:p-5">
                <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider border-b border-slate-100 pb-3 mb-4 lg:mb-5">Kontrol Yüzeyleri</h2>
                
                <div class="mb-4 lg:mb-5">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">Hücum Açısı (Pitch)</label>
                        <span id="pitchLabel" class="text-blue-600">0°</span>
                    </div>
                    <input type="range" id="pitchSlider" min="-30" max="30" value="0" class="w-full">
                </div>

                <div class="mb-4 lg:mb-5">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">Yatış Açısı (Roll)</label>
                        <span id="rollLabel" class="text-green-600">0°</span>
                    </div>
                    <input type="range" id="rollSlider" min="-30" max="30" value="0" class="w-full">
                </div>

                <div class="mb-4 lg:mb-5">
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">Sapma (Yaw)</label>
                        <span id="yawLabel" class="text-yellow-600">0°</span>
                    </div>
                    <input type="range" id="yawSlider" min="-30" max="30" value="0" class="w-full">
                </div>

                <div>
                    <div class="flex justify-between text-xs font-semibold mb-2">
                        <label class="text-slate-600">İtki Gücü (Thrust)</label>
                        <span id="thrustLabel" class="text-red-600">0%</span>
                    </div>
                    <input type="range" id="thrustSlider" min="0" max="100" value="0" class="w-full">
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 lg:p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wider">Kuvvet Analizi</h2>
                    <div id="stallWarning" class="hidden px-2 py-0.5 bg-red-100 text-red-600 text-[10px] font-bold rounded animate-pulse">STALL!</div>
                </div>
                <div class="h-40 lg:h-48">
                    <canvas id="physicsChart"></canvas>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4 text-[10px] font-mono text-slate-500 border-t pt-3">
                    <div>LIFT: <span id="liftVal" class="text-blue-600 font-bold">0</span> N</div>
                    <div>DRAG: <span id="dragVal" class="text-red-600 font-bold">0</span> N</div>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl shadow-sm p-4 lg:p-5 text-white">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-2 rounded border border-slate-700">
                        <p class="text-[9px] text-slate-500">HAVA HIZI</p>
                        <p class="font-mono text-lg text-blue-400"><span id="speedVal">0</span> m/s</p>
                    </div>
                    <div class="bg-slate-900 p-2 rounded border border-slate-700">
                        <p class="text-[9px] text-slate-500">YÜKLEME</p>
                        <p class="font-mono text-lg text-green-400"><span id="gVal">1.0</span> G</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full h-[40vh] min-h-[250px] lg:h-auto lg:flex-1 flex flex-col bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden relative order-1 lg:order-2 shrink-0 lg:shrink">
            <div class="bg-slate-100 border-b border-slate-200 px-3 lg:px-4 py-2 lg:py-3 flex justify-between items-center absolute w-full z-10">
                <h2 class="text-xs lg:text-sm font-bold text-slate-700 uppercase tracking-wider">3D Rüzgar Tüneli Simülasyonu</h2>
                <span class="flex items-center gap-1 lg:gap-2 text-[10px] lg:text-xs font-mono text-green-600">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> <span class="hidden sm:inline">TELEMETRİ BAĞLI</span>
                </span>
            </div>
            <div class="flex-1 bg-slate-50 bg-grid relative w-full h-full" id="canvas-container"></div>
        </div>

    </main>

    <script>
        // --- 1. CHART KURULUMU (Kuvvet Analizi) ---
        const ctx = document.getElementById('physicsChart').getContext('2d');
        const physicsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [
                    {
                        label: 'Taşıma (Lift)',
                        borderColor: '#3b82f6',
                        backgroundColor: '#3b82f633',
                        data: Array(30).fill(0),
                        borderWidth: 2,
                        fill: true,
                        pointRadius: 0,
                        tension: 0.3
                    },
                    {
                        label: 'Sürüklenme (Drag)',
                        borderColor: '#ef4444',
                        data: Array(30).fill(0),
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 250, grid: { color: '#f1f5f9' }, ticks: { font: { size: 9 } } },
                    x: { grid: { display: false } }
                },
                plugins: {
                    legend: { display: true, labels: { boxWidth: 8, font: { size: 10 } } }
                }
            }
        });

        // --- 2. THREE.JS KURULUMU ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(5, 4, 8); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Uçak Parçaları
        const airplane = new THREE.Group();
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1e3a8a });
        const wingMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6 });
        const orangeMat = new THREE.MeshPhongMaterial({ color: 0xf97316 });

        const fuselage = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 5), bodyMat);
        airplane.add(fuselage);
        
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1), new THREE.MeshPhongMaterial({ color: 0x93c5fd }));
        cockpit.position.set(0, 0.7, 0.5);
        airplane.add(cockpit);

        const wingG = new THREE.BoxGeometry(4.5, 0.1, 1.2);
        const wing = new THREE.Mesh(wingG, wingMat);
        airplane.add(wing);

        const tailH = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.8), wingMat);
        tailH.position.set(0, 0.2, -2.2);
        airplane.add(tailH);

        const tailV = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.2, 0.8), wingMat);
        tailV.position.set(0, 0.8, -2.2);
        airplane.add(tailV);

        // Pervane
        const propGroup = new THREE.Group();
        propGroup.position.set(0, 0, 2.6);
        const blade = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.1), orangeMat);
        propGroup.add(blade);
        airplane.add(propGroup);

        scene.add(airplane);

        // Rüzgar Çizgileri
        const windCount = 150;
        const windLines = new THREE.Group();
        const windPositions = new Float32Array(windCount * 6);
        const windGeometry = new THREE.BufferGeometry();
        for(let i=0; i<windCount; i++) {
            const x = (Math.random()-0.5)*15; const y = (Math.random()-0.5)*10; const z = (Math.random()-0.5)*20;
            const idx = i*6;
            windPositions[idx]=x; windPositions[idx+1]=y; windPositions[idx+2]=z;
            windPositions[idx+3]=x; windPositions[idx+4]=y; windPositions[idx+5]=z+0.5;
        }
        windGeometry.setAttribute('position', new THREE.BufferAttribute(windPositions, 3));
        const windMat = new THREE.LineBasicMaterial({ color: 0xcbd5e1, transparent: true, opacity: 0 });
        const windSystem = new THREE.LineSegments(windGeometry, windMat);
        scene.add(windSystem);

        // --- 3. FİZİK VE DÖNGÜ ---
        const sliders = {
            pitch: document.getElementById('pitchSlider'),
            roll: document.getElementById('rollSlider'),
            yaw: document.getElementById('yawSlider'),
            thrust: document.getElementById('thrustSlider')
        };

        const labels = {
            pitch: document.getElementById('pitchLabel'),
            roll: document.getElementById('rollLabel'),
            yaw: document.getElementById('yawLabel'),
            thrust: document.getElementById('thrustLabel'),
            speed: document.getElementById('speedVal'),
            lift: document.getElementById('liftVal'),
            drag: document.getElementById('dragVal'),
            g: document.getElementById('gVal')
        };

        function animate() {
            requestAnimationFrame(animate);

            const p = parseFloat(sliders.pitch.value);
            const r = parseFloat(sliders.roll.value);
            const y = parseFloat(sliders.yaw.value);
            const t = parseFloat(sliders.thrust.value);

            // UI Yazıları
            labels.pitch.innerText = p + "°";
            labels.roll.innerText = r + "°";
            labels.yaw.innerText = y + "°";
            labels.thrust.innerText = t + "%";

            // Uçak Rotasyonu
            airplane.rotation.x = THREE.MathUtils.degToRad(-p);
            airplane.rotation.z = THREE.MathUtils.degToRad(-r);
            airplane.rotation.y = THREE.MathUtils.degToRad(-y);
            propGroup.rotation.z -= t * 0.005;

            // Rüzgar Efekti
            windMat.opacity = (t/100)*0.4;
            const posArr = windSystem.geometry.attributes.position.array;
            for(let i=0; i<windCount; i++) {
                const idx = i*6;
                posArr[idx+2] += (t*0.01);
                posArr[idx+5] += (t*0.01);
                if(posArr[idx+2] > 10) {
                    posArr[idx+2] = -10; posArr[idx+5] = -9.5;
                }
            }
            windSystem.geometry.attributes.position.needsUpdate = true;

            // --- AERODİNAMİK HESAPLAMA ---
            const velocity = t * 0.8; // Hız Thrust'a bağlı
            const alpha = p * (Math.PI / 180); // Radyan cinsinden hücum açısı
            
            // Basit Lift Formülü: L = 0.5 * rho * v^2 * CL
            // CL açıyla lineer artar ama 18 dereceden sonra düşer (Stall)
            let CL = 2 * Math.PI * alpha;
            const stallWarning = document.getElementById('stallWarning');
            if(p > 18) {
                CL *= 0.5; // Taşıma kaybı
                stallWarning.classList.remove('hidden');
            } else {
                stallWarning.classList.add('hidden');
            }

            const lift = Math.max(0, 0.5 * (velocity**2) * CL * 0.1);
            const drag = (0.5 * (velocity**2) * 0.05) + (lift * 0.2); // Profil Drag + İndüklenmiş Drag

            // Grafik ve Telemetri Güncelleme
            labels.speed.innerText = velocity.toFixed(1);
            labels.lift.innerText = lift.toFixed(0);
            labels.drag.innerText = drag.toFixed(0);
            labels.g.innerText = (1 + lift/100).toFixed(1);

            physicsChart.data.datasets[0].data.shift();
            physicsChart.data.datasets[0].data.push(lift);
            physicsChart.data.datasets[1].data.shift();
            physicsChart.data.datasets[1].data.push(drag);
            physicsChart.update('none');

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        animate();
    </script>
</body>
</html>
