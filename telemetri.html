<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetri Merkezi | Voltpitch Akademi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <span class="font-extrabold text-2xl tracking-tight text-slate-900">
                        Volt<span class="text-blue-600">pitch</span> 
                        <span class="font-light text-slate-500 text-xl ml-1">Akademi</span>
                    </span>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Ana Sayfa</a>
                    <a href="telemetri.html" class="text-blue-600 border-b-2 border-blue-600 px-3 py-2 text-sm font-bold">Telemetri Merkezi</a>
                    <a href="ucus-dinamikleri.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Uçuş Dinamikleri</a>
                    <a href="arge-atolyesi.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Ar-Ge Atölyesi</a>
                    <a href="dokumantasyon.html" class="text-slate-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition">Dokümantasyon</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6 overflow-auto">
        
        <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-sm font-bold text-slate-700 tracking-wider">TUNA E-96 OTONOM ROVER</span>
                </div>
                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">VERİ AKIŞI AKTİF</span>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500">GECİKME (PING)</p>
                <p class="font-mono text-sm font-bold text-green-600">24 ms</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
            
            <div class="flex flex-col gap-6">
                <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Güç ve İletişim</h3>
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <p class="text-sm text-slate-600">Ana Batarya</p>
                            <p class="font-mono text-2xl font-bold text-slate-800" id="batteryVal">84%</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-slate-600">Sinyal Gücü</p>
                            <p class="font-mono text-2xl font-bold text-blue-600">-68 dBm</p>
                        </div>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2">
                        <div class="bg-blue-600 h-2 rounded-full" style="width: 84%"></div>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-xl p-5 shadow-sm flex-1 flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Sistem Logları</h3>
                    <div class="flex-1 bg-black rounded p-3 overflow-hidden border border-slate-700 relative">
                        <div id="consoleText" class="font-mono text-[10px] text-green-400 flex flex-col gap-1 absolute bottom-3 w-full">
                            </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 flex flex-col gap-6">
                <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm h-64 relative">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Motor Sıcaklıkları (°C)</h3>
                    <canvas id="tempChart"></canvas>
                </div>
                
                <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm h-64 relative">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Anlık Güç Tüketimi (W)</h3>
                    <canvas id="powerChart"></canvas>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- 1. GRAFİK AYARLARI (Chart.js) ---
        // Grafiklerin ortak tasarım ayarları (Havacılık temamıza uygun ince çizgiler)
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 }, // Canlı akış için animasyonları kapattık
            scales: {
                x: { display: false }, // Alt ekseni gizle
                y: { grid: { color: '#f1f5f9' }, beginAtZero: true }
            },
            elements: { point: { radius: 0 }, line: { borderWidth: 2, tension: 0.4 } },
            plugins: { legend: { display: false } }
        };

        // Sıcaklık Grafiği (Kırmızı tonlar)
        const ctxTemp = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctxTemp, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ data: Array(30).fill(35), borderColor: '#ef4444', backgroundColor: '#fecaca', fill: true }] },
            options: { ...commonOptions, scales: { y: { min: 20, max: 80 } } }
        });

        // Güç Tüketimi Grafiği (Mavi tonlar)
        const ctxPower = document.getElementById('powerChart').getContext('2d');
        const powerChart = new Chart(ctxPower, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ data: Array(30).fill(10), borderColor: '#3b82f6', backgroundColor: '#bfdbfe', fill: true }] },
            options: { ...commonOptions, scales: { y: { min: 0, max: 50 } } }
        });

        // --- 2. CANLI VERİ SİMÜLASYONU ---
        // Bu fonksiyon her saniye çalışıp grafiklere yeni veri ekler
        setInterval(() => {
            // Rastgele yeni veriler üret (Python'dan geliyormuş gibi)
            const newTemp = 40 + Math.random() * 5; 
            const newPower = 15 + Math.random() * 20;

            // Verileri grafik dizisine ekle, en eskisini sil
            tempChart.data.datasets[0].data.push(newTemp);
            tempChart.data.datasets[0].data.shift();
            tempChart.update();

            powerChart.data.datasets[0].data.push(newPower);
            powerChart.data.datasets[0].data.shift();
            powerChart.update();

        }, 1000); // 1000 ms (1 saniye)

        // --- 3. KONSOL LOG SİMÜLASYONU ---
        const consoleEl = document.getElementById('consoleText');
        const logs = [
            "SYS: ToF Sensör verisi alınıyor...",
            "MOT: Sağ ön tekerlek torku normal.",
            "NAV: Hedef koordinata 12 metre kaldı.",
            "SYS: Haritalama algoritması aktif.",
            "NET: Telemetri paketi gönderildi."
        ];

        setInterval(() => {
            const time = new Date().toLocaleTimeString('tr-TR');
            const randomLog = logs[Math.floor(Math.random() * logs.length)];
            const logHTML = `<p>[${time}] > ${randomLog}</p>`;
            
            consoleEl.innerHTML += logHTML;
            // Ekranda çok satır birikmesin diye eskileri sil
            if (consoleEl.children.length > 5) {
                consoleEl.removeChild(consoleEl.firstChild);
            }
        }, 2500); // Her 2.5 saniyede bir yeni log yaz
    </script>
</body>
</html>
